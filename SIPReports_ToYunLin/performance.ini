# RAG Chatbot Performance Tuning
# Adjust these to balance speed vs answer quality

[RETRIEVAL]
# Number of chunks to retrieve. Fewer = faster but less context
context_k = 4

# Use hybrid search (dense + keyword). Set to false for speed, true for quality
use_hybrid = true

# Max characters from context to send to LLM. Reduce for speed.
# Each character roughly adds 0.01-0.02s to generation.
max_context_chars = 5000

[GENERATION]
# Max words in answer. Fewer words = faster generation.
# phi3 generates ~10 words/second, mistral ~5 words/second
max_answer_words = 320

# Ollama context window. Reduce for speed (default 8192).
# Each 1000 tokens adds ~0.5-1s overhead.
ollama_num_ctx = 4096

# Temperature: controls randomness (0.0-1.0)
# 0.2 = deterministic, fast
# Higher = more creative, slightly slower
temperature = 0.2

[MODEL_CHOICE]
# MODEL options: phi3 (fast, small), mistral (medium), llama3.2 (slower, better)
# phi3 = ~3s/answer, mistral = ~8s/answer, llama3 = ~15s/answer
model = phi3

# If model not found, try these in order
fallback_models = phi3,mistral,gemma2:2b

[UI]
# Show retrieved context in chat? false = faster response display
show_raw_context = false

# Enable streaming answer display (shows words as they arrive)
streaming_enabled = false
